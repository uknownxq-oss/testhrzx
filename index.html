
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRZX PROMPT - Cyber Aesthetic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/font-awesome.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #02040a;
            background-image: 
                radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #0f172a 0%, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
        }

        .header-font {
            font-family: 'Syncopate', sans-serif;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(56, 189, 248, 0.05);
        }

        .cyber-btn {
            background: linear-gradient(90deg, #0ea5e9 0%, #2563eb 100%);
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cyber-btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.6);
            filter: brightness(1.1);
        }

        .cyber-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .loader {
            border: 2px solid rgba(14, 165, 233, 0.1);
            border-radius: 50%;
            border-top: 2px solid #0ea5e9;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .prompt-container {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: inset 0 0 15px rgba(14, 165, 233, 0.1);
        }

        .upload-area {
            background: rgba(30, 41, 59, 0.3);
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #0ea5e9;
            background: rgba(14, 165, 233, 0.05);
        }

        .cyber-accent {
            color: #38bdf8;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="max-w-2xl w-full space-y-8">
        <!-- App Header -->
        <div class="text-center space-y-2">
            <h1 class="header-font text-2xl md:text-4xl font-bold tracking-[0.3em] cyber-accent">
                HRZX PROMPT
            </h1>
            <p class="text-slate-400 text-[10px] uppercase tracking-[0.5em] font-semibold">
                iPhone Realistic Prompt Engine
            </p>
        </div>

        <!-- Main Workspace -->
        <div class="glass-card rounded-[2rem] p-6 md:p-10 shadow-2xl space-y-8 relative overflow-hidden">
            <!-- Decorative Light Flare -->
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-500/10 blur-[80px]"></div>
            
            <!-- Image Input -->
            <div id="dropArea" class="upload-area relative border border-slate-800 rounded-2xl p-8 text-center cursor-pointer group">
                <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*">
                
                <div id="emptyState" class="space-y-4">
                    <div class="w-16 h-16 bg-slate-900/50 rounded-full flex items-center justify-center mx-auto border border-blue-500/20 group-hover:border-blue-500/50 transition-all">
                        <i class="fa-solid fa-cloud-arrow-up text-blue-400 text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-slate-200 font-bold uppercase tracking-widest">Upload Reference Image</p>
                        <p class="text-xs text-slate-500 mt-1">Tap to select or drag & drop</p>
                    </div>
                </div>

                <div id="previewState" class="hidden">
                    <img id="imgDisplay" src="#" alt="Preview" class="mx-auto rounded-xl max-h-56 shadow-2xl border border-blue-500/30">
                    <div class="mt-4 flex items-center justify-center gap-2 text-[10px] text-blue-400 font-bold uppercase tracking-wider">
                        <i class="fa-solid fa-sync"></i> Replace Image
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <button id="actionBtn" disabled class="cyber-btn w-full py-5 rounded-2xl font-black text-xs tracking-[0.3em] uppercase disabled:opacity-20 disabled:grayscale disabled:cursor-not-allowed">
                Generate Structured Prompt
            </button>

            <!-- Loading UI -->
            <div id="loadingIndicator" class="hidden flex flex-col items-center justify-center gap-4 py-6">
                <div class="loader"></div>
                <span class="text-[10px] font-black tracking-[0.3em] uppercase text-blue-400 animate-pulse">Analyzing Visual Data</span>
            </div>

            <!-- Results -->
            <div id="resultBox" class="hidden space-y-6">
                <div class="flex items-center justify-between border-b border-blue-500/20 pb-4">
                    <span class="text-[10px] font-black text-blue-400 uppercase tracking-[0.3em]">Extracted Prompt</span>
                    <button id="copyBtn" class="flex items-center gap-2 text-[10px] font-black bg-blue-500/10 text-blue-400 px-4 py-2 rounded-lg border border-blue-500/30 hover:bg-blue-500/20 transition-all uppercase">
                        <i class="fa-regular fa-copy"></i> Copy Prompt
                    </button>
                </div>
                
                <div id="promptContent" class="prompt-container p-6 rounded-2xl text-xs md:text-sm font-mono text-blue-100 leading-relaxed whitespace-pre-wrap border border-blue-500/10"></div>
                
                <div id="copySuccess" class="hidden text-center text-[10px] font-bold text-cyan-400 uppercase tracking-widest animate-bounce">
                    <i class="fa-solid fa-check-circle mr-2"></i>Copied to clipboard
                </div>
            </div>
        </div>

        <div class="flex justify-center items-center gap-4 opacity-30">
            <div class="h-[1px] w-12 bg-blue-500"></div>
            <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-blue-400">Vision System v2.5</p>
            <div class="h-[1px] w-12 bg-blue-500"></div>
        </div>
    </div>

    <script>
        const apiKey = ""; // Disuntikkan sistem
        const fileInput = document.getElementById('fileInput');
        const actionBtn = document.getElementById('actionBtn');
        const emptyState = document.getElementById('emptyState');
        const previewState = document.getElementById('previewState');
        const imgDisplay = document.getElementById('imgDisplay');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const resultBox = document.getElementById('resultBox');
        const promptContent = document.getElementById('promptContent');
        const copyBtn = document.getElementById('copyBtn');
        const copySuccess = document.getElementById('copySuccess');

        let imageData = "";

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imageData = event.target.result.split(',')[1];
                    imgDisplay.src = event.target.result;
                    emptyState.classList.add('hidden');
                    previewState.classList.remove('hidden');
                    actionBtn.disabled = false;
                    resultBox.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        async function processImage() {
            if (!imageData) return;

            actionBtn.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            resultBox.classList.add('hidden');

            const systemInstruction = `Anda adalah Image Prompt Engineer. Tugas Anda adalah menganalisis gambar referensi dan mengekstrak deskripsi visual ke dalam format terstruktur yang ketat.
            
            FORMAT WAJIB:
            Make a Picture Ultrarealistic -
            SUBJECT: [HANYA tuliskan "a man" atau "a girl" tergantung subjek utama di foto, jangan beri deskripsi tambahan di bagian ini]
            ANGLE: [Sudut pandang kamera smartphone, misal: eye-level, low angle, top down]
            OUTFIT: [Deskripsi pakaian, bahan, dan warna]
            POSE: [Posisi tubuh dan ekspresi wajah]
            ENVIRONMENT: [Setting lokasi, latar belakang, dan detail sekitarnya]
            LIGHTING: [Gaya pencahayaan iPhone: natural daylight, smart HDR, soft indoor shadows, warm sunset glow, no cinematic artificial lighting]

            ATURAN:
            - Gunakan Bahasa Inggris.
            - Gaya harus realistis 'Shot on iPhone'.
            - Bagian SUBJECT wajib hanya berisi kata "a man" atau "a girl".
            - Jangan tambahkan teks pembuka atau penutup. Langsung berikan format di atas.`;

            const prompt = "Analyze this image and convert it into the requested structured prompt format. Remember the SUBJECT must strictly be just 'a man' or 'a girl'.";

            let retries = 0;
            const maxRetries = 5;

            async function callApi() {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt },
                                    { inlineData: { mimeType: "image/png", data: imageData } }
                                ]
                            }],
                            systemInstruction: { parts: [{ text: systemInstruction }] }
                        })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error("API Error");
                    
                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Gagal menghasilkan prompt.";

                    promptContent.textContent = resultText.trim();
                    loadingIndicator.classList.add('hidden');
                    actionBtn.classList.remove('hidden');
                    resultBox.classList.remove('hidden');

                } catch (error) {
                    if (retries < maxRetries) {
                        const delay = Math.pow(2, retries) * 1000;
                        retries++;
                        setTimeout(callApi, delay);
                    } else {
                        loadingIndicator.classList.add('hidden');
                        actionBtn.classList.remove('hidden');
                        alert("Gagal menghubungi AI. Coba lagi.");
                    }
                }
            }

            callApi();
        }

        actionBtn.addEventListener('click', processImage);

        copyBtn.addEventListener('click', () => {
            const text = promptContent.textContent;
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = text;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextArea);

            copySuccess.classList.remove('hidden');
            setTimeout(() => copySuccess.classList.add('hidden'), 3000);
        });
    </script>
</body>
</html>
