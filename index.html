```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRZX PROMPT - Cyber Aesthetic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/font-awesome.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #02040a;
            background-image: 
                radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #0f172a 0%, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-font { font-family: 'Syncopate', sans-serif; }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);

            border: 1px solid rgba(56, 189, 248, 0.2);

        .cyber-btn {
            background: linear-gradient(90deg, #0ea5e9 0%, #2563eb 100%);
            color: #ffffff;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .cyber-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
        }

        .loader {
            border: 2px solid rgba(14, 165, 233, 0.1);
            border-top: 2px solid #0ea5e9;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .prompt-box {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .cyber-accent {
            color: #38bdf8;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
        }
    </style>
</head>
<body>

    <div class="max-w-2xl w-full p-4 space-y-8">
        <div class="text-center space-y-2">
            <h1 class="header-font text-2xl md:text-4xl font-bold tracking-[0.3em] cyber-accent">HRZX PROMPT</h1>
            <p class="text-slate-400 text-[10px] uppercase tracking-[0.5em]">iPhone Realistic Prompt Engine</p>
        </div>

        <div class="glass-card rounded-[2rem] p-6 md:p-10 space-y-8 relative overflow-hidden">
            <!-- Upload Area -->
            <div onclick="document.getElementById('fileInput').click()" class="relative border border-slate-800 rounded-2xl p-8 text-center cursor-pointer hover:border-blue-500/50 transition-all">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                
                <div id="emptyState" class="space-y-4">
                    <div class="w-16 h-16 bg-slate-900/50 rounded-full flex items-center justify-center mx-auto border border-blue-500/20">
                        <i class="fa-solid fa-cloud-arrow-up text-blue-400 text-xl"></i>
                    </div>
                    <p class="text-sm text-slate-200 font-bold uppercase tracking-widest">Klik Untuk Upload Gambar</p>
                </div>

                <div id="previewState" class="hidden">
                    <img id="imgDisplay" src="#" alt="Preview" class="mx-auto rounded-xl max-h-56 shadow-2xl border border-blue-500/30">
                    <p class="mt-4 text-[10px] text-blue-400 font-bold uppercase tracking-wider">Tukar Gambar</p>
                </div>
            </div>

            <button id="actionBtn" disabled class="cyber-btn w-full py-5 rounded-2xl font-black text-xs tracking-[0.3em] uppercase disabled:opacity-20">
                Generate Structured Prompt
            </button>

            <!-- Loading -->
            <div id="loadingIndicator" class="hidden flex flex-col items-center justify-center gap-4 py-6">
                <div class="loader"></div>
                <span class="text-[10px] font-black tracking-[0.3em] text-blue-400 uppercase">Menganalisis Gambar...</span>
            </div>

            <!-- Result -->
            <div id="resultBox" class="hidden space-y-6">
                <div class="flex items-center justify-between border-b border-blue-500/20 pb-4">
                    <span class="text-[10px] font-black text-blue-400 uppercase tracking-[0.3em]">Hasil Prompt</span>
                    <button id="copyBtn" class="bg-blue-500/10 text-blue-400 px-4 py-2 rounded-lg border border-blue-500/30 text-[10px] font-black uppercase hover:bg-blue-500/20">Copy Prompt</button>
                </div>
                <div id="promptContent" class="prompt-box p-6 rounded-2xl text-xs md:text-sm font-mono text-blue-100 leading-relaxed whitespace-pre-wrap"></div>
                <div id="copySuccess" class="hidden text-center text-[10px] font-bold text-cyan-400 uppercase tracking-widest">Berhasil Disalin!</div>
            </div>
        </div>
    </div>

    <script>
        /* CARA AKTIFKAN:
           1. Pergi ke https://aistudio.google.com/
           2. Dapatkan API Key
           3. Tampal kod tersebut di dalam tanda "" di bawah ini.
        */
        const apiKey = "AIzaSyC0NvfLUYSA2JU6r6Oh3c958ANYzafmlHY"; 

        const fileInput = document.getElementById('fileInput');
        const actionBtn = document.getElementById('actionBtn');
        const emptyState = document.getElementById('emptyState');
        const previewState = document.getElementById('previewState');
        const imgDisplay = document.getElementById('imgDisplay');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const resultBox = document.getElementById('resultBox');
        const promptContent = document.getElementById('promptContent');
        const copyBtn = document.getElementById('copyBtn');
        const copySuccess = document.getElementById('copySuccess');

        let imageData = "";

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imageData = event.target.result.split(',')[1];
                    imgDisplay.src = event.target.result;
                    emptyState.classList.add('hidden');
                    previewState.classList.remove('hidden');
                    actionBtn.disabled = false;
                    resultBox.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        async function processImage() {
            if (!apiKey || apiKey === "") {
                alert("Sila masukkan API Key dalam kod baris 112!");
                return;
            }

            actionBtn.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            resultBox.classList.add('hidden');

            const systemInstruction = `Anda adalah Image Prompt Engineer. Tugas Anda adalah menganalisis gambar referensi dan mengekstrak deskripsi visual ke dalam format terstruktur yang ketat.
            
            FORMAT WAJIB:
            Make a Picture Ultrarealistic -
            SUBJECT: [HANYA tuliskan "a man" atau "a girl" tergantung subjek utama di foto, jangan beri deskripsi tambahan di bagian ini]
            ANGLE: [Sudut pandang kamera smartphone, misal: eye-level, low angle, top down]
            OUTFIT: [Deskripsi pakaian, bahan, dan warna]
            POSE: [Posisi tubuh dan ekspresi wajah]
            ENVIRONMENT: [Setting lokasi, latar belakang, dan detail sekitarnya]
            LIGHTING: [Gaya pencahayaan iPhone: natural daylight, smart HDR, soft indoor shadows, warm sunset glow, no cinematic artificial lighting]

            ATURAN:
            - Gunakan Bahasa Inggris.
            - Gaya harus realistis 'Shot on iPhone'.
            - Bagian SUBJECT wajib hanya berisi kata "a man" atau "a girl".
            - Jangan tambahkan teks pembuka atau penutup. Langsung berikan format di atas.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Analyze this image and provide the prompt." },
                                { inlineData: { mimeType: "image/png", data: imageData } }
                            ]
                        }],
                        systemInstruction: { parts: [{ text: systemInstruction }] }
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Gagal menjana.";
                promptContent.textContent = resultText.trim();
                loadingIndicator.classList.add('hidden');
                actionBtn.classList.remove('hidden');
                resultBox.classList.remove('hidden');

            } catch (error) {
                alert("Error: " + error.message);
                loadingIndicator.classList.add('hidden');
                actionBtn.classList.remove('hidden');
            }
        }

        actionBtn.addEventListener('click', processImage);
        copyBtn.addEventListener('click', () => {
            const el = document.createElement('textarea');
            el.value = promptContent.textContent;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            copySuccess.classList.remove('hidden');
            setTimeout(() => copySuccess.classList.add('hidden'), 2000);
        });
    </script>
</body>
</html>
