<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystal Clear Blue Cloud Storage</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Inter', sans-serif;
    }

    body{
        background:linear-gradient(135deg, rgba(0,153,255,0.6), rgba(0,204,255,0.4), rgba(255,255,255,0.3));
        backdrop-filter:blur(20px);
        min-height:100vh;
        display:flex;
        flex-direction:column;
        color:#fff;
    }

    header{
        width:100%;
        padding:20px 40px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:rgba(255,255,255,0.15);
        backdrop-filter:blur(20px);
        border-bottom:1px solid rgba(255,255,255,0.2);
    }

    header h1{
        font-size:28px;
        font-weight:700;
        letter-spacing:1px;
        color:#e9f7ff;
        text-shadow:0 0 10px rgba(255,255,255,0.4);
    }

    nav a{
        margin-left:20px;
        text-decoration:none;
        color:#e9f7ff;
        font-weight:500;
        transition:0.3s;
    }

    nav a:hover{
        color:#fff;
        text-shadow:0 0 10px rgba(255,255,255,0.6);
    }

    .hero{
        width:100%;
        padding:80px 20px;
        text-align:center;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        animation:fadeIn 1.5s ease;
    }

    .hero h2{
        font-size:48px;
        font-weight:800;
        margin-bottom:20px;
        color:#e9f7ff;
        text-shadow:0 0 15px rgba(255,255,255,0.5);
    }

    .hero p{
        font-size:18px;
        max-width:600px;
        color:#f0fbff;
        margin-bottom:40px;
        line-height:1.6;
    }

    .upload-box{
        width:90%;
        max-width:600px;
        padding:40px;
        background:rgba(255,255,255,0.2);
        border-radius:20px;
        backdrop-filter:blur(25px);
        border:1px solid rgba(255,255,255,0.3);
        display:flex;
        flex-direction:column;
        align-items:center;
        animation:slideUp 1.5s ease;
    }

    .upload-box input{
        margin:20px 0;
        padding:15px;
        width:100%;
        border-radius:12px;
        border:none;
        background:rgba(255,255,255,0.3);
        color:#fff;
        font-size:16px;
    }

    .upload-box button{
        padding:15px 30px;
        border:none;
        border-radius:12px;
        background:linear-gradient(135deg, #00aaff, #00ccff);
        color:#fff;
        font-size:18px;
        font-weight:600;
        cursor:pointer;
        transition:0.3s;
    }

    .upload-box button:hover{
        transform:scale(1.05);
        box-shadow:0 0 15px rgba(0,204,255,0.6);
    }

    .gallery{
        width:100%;
        padding:60px 20px;
        display:grid;
        grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
        gap:30px;
        animation:fadeIn 2s ease;
    }

    .item{
        background:rgba(255,255,255,0.2);
        border-radius:20px;
        backdrop-filter:blur(20px);
        padding:20px;
        border:1px solid rgba(255,255,255,0.3);
        display:flex;
        flex-direction:column;
        align-items:center;
        transition:0.3s;
    }

    .item:hover{
        transform:translateY(-5px);
        box-shadow:0 0 20px rgba(255,255,255,0.4);
    }

    .item img, .item video{
        width:100%;
        border-radius:15px;
        margin-bottom:15px;
    }

    footer{
        margin-top:auto;
        padding:20px;
        text-align:center;
        background:rgba(255,255,255,0.15);
        backdrop-filter:blur(20px);
        border-top:1px solid rgba(255,255,255,0.2);
        color:#e9f7ff;
    }

    @keyframes fadeIn{
        from{opacity:0;}
        to{opacity:1;}
    }

    @keyframes slideUp{
        from{transform:translateY(40px); opacity:0;}
        to{transform:translateY(0); opacity:1;}
    }
</style>
</head>
<body>

<header>
    <h1>Crystal Cloud</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Upload</a>
        <a href="#">Gallery</a>
        <a href="#">Profile</a>
    </nav>
</header>

<section class="hero">
    <h2>Crystal Clear Blue Cloud Storage</h2>
    <p>Simpan gambar dan video anda dengan aman di cloud bertema Crystal Clear Blue iOS 26. Desain elegan, modern, dan super responsif.</p>

    <div class="upload-box">
        <h3>Upload File</h3>
        <input type="file" id="fileInput" multiple>
        <button onclick="uploadFiles()">Upload</button>
    </div>
</section>

<section class="gallery" id="gallery"></section>

<footer>
    © 2026 Crystal Cloud — Blue iOS 26 Theme
</footer>

<script>
    let gallery = document.getElementById("gallery");

    function uploadFiles(){
        let files = document.getElementById("fileInput").files;
        for(let i=0; i<files.length; i++){
            let file = files[i];
            let reader = new FileReader();

            reader.onload = function(e){
                let item = document.createElement("div");
                item.className = "item";

                if(file.type.startsWith("image")){
                    let img = document.createElement("img");
                    img.src = e.target.result;
                    item.appendChild(img);
                } else if(file.type.startsWith("video")){
                    let video = document.createElement("video");
                    video.src = e.target.result;
                    video.controls = true;
                    item.appendChild(video);
                }

                gallery.appendChild(item);
            };

            reader.readAsDataURL(file);
        }
    }
</script>

</body>
</html>
