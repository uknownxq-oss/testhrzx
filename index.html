
<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRZX PROMPT - OpenRouter Free Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/font-awesome.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #02040a;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-font { font-family: 'Syncopate', sans-serif; }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .cyber-btn {
            background: linear-gradient(90deg, #0ea5e9 0%, #2563eb 100%);
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .loader {
            border: 2px solid rgba(14, 165, 233, 0.1);
            border-top: 2px solid #0ea5e9;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .prompt-box {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

    <div class="max-w-2xl w-full p-4 space-y-8">
        <div class="text-center space-y-2">
            <h1 class="header-font text-2xl md:text-3xl font-bold tracking-[0.3em] text-sky-400">HRZX PROMPT</h1>
            <p id="modelStatus" class="text-slate-400 text-[9px] uppercase tracking-[0.4em]">Model: OpenRouter/Free</p>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8 md:p-10 space-y-8">
            <div onclick="document.getElementById('fileInput').click()" class="relative border-2 border-dashed border-slate-800 rounded-2xl p-8 text-center cursor-pointer hover:border-sky-500/50 bg-slate-900/20">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                
                <div id="emptyState">
                    <i class="fa-solid fa-bolt text-yellow-400/50 text-3xl mb-4"></i>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Muat Naik Gambar</p>
                </div>

                <div id="previewState" class="hidden">
                    <img id="imgDisplay" src="#" class="mx-auto rounded-xl max-h-56 shadow-2xl border border-sky-500/30">
                    <p class="mt-4 text-[9px] text-sky-400 font-bold uppercase">Klik Untuk Tukar</p>
                </div>
            </div>

            <button id="actionBtn" disabled class="cyber-btn w-full py-5 rounded-2xl font-black text-[10px] tracking-[0.3em] uppercase disabled:opacity-20">
                PROSES DENGAN OPENROUTER/FREE
            </button>

            <div id="loadingIndicator" class="hidden flex flex-col items-center justify-center gap-4 py-6">
                <div class="loader"></div>
                <span id="loadingText" class="text-[9px] font-black tracking-[0.3em] text-sky-400 uppercase">Menghubungi OpenRouter Free...</span>
            </div>

            <div id="resultBox" class="hidden space-y-6">
                <div class="flex items-center justify-between border-b border-sky-500/20 pb-4">
                    <span class="text-[9px] font-black text-sky-400 uppercase tracking-[0.3em]">Prompt Result</span>
                    <button id="copyBtn" class="bg-sky-500/10 text-sky-400 px-4 py-2 rounded-lg border border-sky-500/30 text-[9px] font-black uppercase hover:bg-sky-500/20">Salin</button>
                </div>
                <div id="promptContent" class="prompt-box p-6 rounded-2xl text-xs md:text-sm text-slate-200 leading-relaxed whitespace-pre-wrap"></div>
                <div id="copySuccess" class="hidden text-center text-[9px] font-bold text-emerald-400 uppercase tracking-[0.3em]">Berjaya Disalin!</div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "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"; // Ganti dengan key anda
        
        // Menggunakan ID model spesifik yang diminta
        const mainModel = "openrouter/free";

        const fileInput = document.getElementById('fileInput');
        const actionBtn = document.getElementById('actionBtn');
        const emptyState = document.getElementById('emptyState');
        const previewState = document.getElementById('previewState');
        const imgDisplay = document.getElementById('imgDisplay');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const loadingText = document.getElementById('loadingText');
        const resultBox = document.getElementById('resultBox');
        const promptContent = document.getElementById('promptContent');
        const copyBtn = document.getElementById('copyBtn');
        const copySuccess = document.getElementById('copySuccess');

        let base64Image = "";

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    base64Image = ev.target.result;
                    imgDisplay.src = ev.target.result;
                    emptyState.classList.add('hidden');
                    previewState.classList.remove('hidden');
                    actionBtn.disabled = false;
                    resultBox.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        async function generatePrompt() {
            if (!apiKey || apiKey.includes("MASUKKAN")) {
                alert("Sila masukkan API Key OpenRouter!");
                return;
            }

            actionBtn.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            resultBox.classList.add('hidden');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey.trim()}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href,
                        "X-Title": "HRZX Prompt Engine"
                    },
                    body: JSON.stringify({
                        model: mainModel,
                        messages: [{
                            role: "user",
                            content: [
                                { type: "text", text: "Analyze the image and strictly generate this format: Make a Picture Ultrarealistic - SUBJECT: [a man/a girl only], ANGLE: [Smartphone angle], OUTFIT: [Detailed outfit], POSE: [Body position], ENVIRONMENT: [Location], LIGHTING: [iPhone lighting]. Important: Use English only. No conversational text." },
                                { type: "image_url", image_url: { url: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message || "Ralat pada model openrouter/free");
                }

                let result = data.choices[0].message.content;
                
                // Pembersihan jika model mengeluarkan reasoning <think>
                result = result.replace(/<think>[\s\S]*?<\/think>/g, '').trim();

                promptContent.textContent = result;
                loadingIndicator.classList.add('hidden');
                resultBox.classList.remove('hidden');
                actionBtn.classList.remove('hidden');

            } catch (err) {
                alert("Ralat: " + err.message);
                loadingIndicator.classList.add('hidden');
                actionBtn.classList.remove('hidden');
            }
        }

        actionBtn.onclick = generatePrompt;

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(promptContent.textContent);
            copySuccess.classList.remove('hidden');
            setTimeout(() => copySuccess.classList.add('hidden'), 2000);
        };
    </script>
</body>
</html>
